server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: qualquer rota que não seja um arquivo real
    # (ex: /perfil, /categorias, /categorias/3/subcategorias)
    # cai de volta no index.html e o React Router assume o roteamento.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com hash no nome (JS/CSS gerados pelo Vite build) podem
    # ser cacheados de forma agressiva.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
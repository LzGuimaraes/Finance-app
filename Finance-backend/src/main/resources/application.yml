spring:
  application:
    name: Finance

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/patrimonio}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway é quem cria/altera o schema, não o Hibernate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

app:
  url: ${APP_URL:http://localhost:8080}

  # URL pública do frontend — usada no link de RESET DE SENHA,
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

jwt:
  secret: ${JWT_SECRET}
  expiracao-ms: ${JWT_EXPIRACAO_MS:3600000}            # 1 hora
  refresh-expiracao-ms: ${JWT_REFRESH_EXPIRACAO_MS:604800000}  # 7 dias

# ── Logging ──────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    Luiz.Finance: DEBUG
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/patrimonio
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: false

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username: email@gmail.com
    password: sua_senha_de_app

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5

server:
  port: 8080

jwt:
  secret: SEU_SECRET_BASE64_AQUI_MINIMO_256_BITS
  expiracao-ms: 3600000
  refresh-expiracao-ms: 604800000

app:
  url: http://localhost:8080
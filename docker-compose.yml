version: '3.8'

services:
  # ==================== BANCO DE DADOS ====================
  db:
    image: postgres:15-alpine
    container_name: patrimonio-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}  
      POSTGRES_USER: ${POSTGRES_USER} 
      POSTGRES_PASSWORD: ${DB_PASSWORD}   # Puxa do .env
    ports:
      - "5432:5432"                       # Expõe para você acessar localmente (opcional)
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== BACKEND (SPRING BOOT) ====================
  backend:
    build: ./Finance-backend
    container_name: patrimonio-backend
    ports:
      - "8080:8080"
    environment:
      # Banco de dados
      SPRING_DATASOURCE_URL: ${DB_URL} 
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      
      # E-mail (todas as propriedades)
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: "587"
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      
      APP_FRONTEND_URL: http://frontend:80
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ==================== FRONTEND (REACT + VITE) ====================
  frontend:
    build:
      context: ./Finance-frontend
      args:
        - VITE_API_URL=${VITE_API_URL}      # Passa a URL para o build do Vite
    container_name: patrimonio-frontend
    ports:
      - "5173:80"                         # Mapeia a porta 80 do container para a 5173 do host
    depends_on:
      - backend
    restart: on-failure

volumes:
  pg_data: